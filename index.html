<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cassino do Rikelme 🎰</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #111;
      color: white;
      margin-top: 50px;
    }

    h1 {
      color: gold;
    }

    #slots {
      font-size: 60px;
      margin: 20px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      background-color: green;
      color: white;
      cursor: pointer;
    }

    #resultado {
      margin-top: 20px;
      font-size: 22px;
    }

    #saldo {
      font-size: 20px;
      margin: 10px;
      color: lightgreen;
    }

    #ranking {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>🎰 Cassino do Rikelme 🎰</h1>

<div id="saldo"></div>

<div id="slots">❓ ❓ ❓</div>

<button onclick="girar()">Apostar R$10</button>

<div id="resultado"></div>

<div id="ranking">
  <h2>🏆 Ranking</h2>
  <ol id="listaRanking"></ol>
</div>

<script>
  let saldo = localStorage.getItem("saldo") ? parseInt(localStorage.getItem("saldo")) : 100;
  const aposta = 10;
  const emojis = ["7️⃣", "🍀", "💣"];

  let nome = localStorage.getItem("nome");
  if (!nome) {
    nome = prompt("Digite seu nome:");
    localStorage.setItem("nome", nome);
  }

  function atualizarSaldo() {
    document.getElementById("saldo").innerHTML = "Saldo: R$" + saldo;
    localStorage.setItem("saldo", saldo);
  }

  function atualizarRanking() {
    let ranking = JSON.parse(localStorage.getItem("ranking")) || [];
    let jogador = ranking.find(j => j.nome === nome);

    if (!jogador) {
      ranking.push({ nome: nome, saldo: saldo });
    } else {
      jogador.saldo = saldo;
    }

    ranking.sort((a, b) => b.saldo - a.saldo);
    ranking = ranking.slice(0, 5);

    localStorage.setItem("ranking", JSON.stringify(ranking));

    let lista = document.getElementById("listaRanking");
    lista.innerHTML = "";

    ranking.forEach(j => {
      let li = document.createElement("li");
      li.textContent = j.nome + " - R$" + j.saldo;
      lista.appendChild(li);
    });
  }

  function animarSlots(callback) {
    let contador = 0;
    let intervalo = setInterval(() => {
      let a = emojis[Math.floor(Math.random() * emojis.length)];
      let b = emojis[Math.floor(Math.random() * emojis.length)];
      let c = emojis[Math.floor(Math.random() * emojis.length)];

      document.getElementById("slots").innerHTML = a + " " + b + " " + c;

      contador++;
      if (contador > 10) {
        clearInterval(intervalo);
        callback(a, b, c);
      }
    }, 100);
  }

  function girar() {
    if (saldo < aposta) {
      document.getElementById("resultado").innerHTML = "💀 Você ficou sem dinheiro!";
      return;
    }

    saldo -= aposta;

    animarSlots((a, b, c) => {
      if (a === b && b === c) {
        saldo += 50;
        document.getElementById("resultado").innerHTML = "🎉 JACKPOT! +R$50";
      } else if (a === "💣" || b === "💣" || c === "💣") {
        document.getElementById("resultado").innerHTML = "💥 Perdeu!";
      } else {
        document.getElementById("resultado").innerHTML = "😅 Nada dessa vez...";
      }

      atualizarSaldo();
      atualizarRanking();
    });
  }

  atualizarSaldo();
  atualizarRanking();
</script>

</body>
</html>
