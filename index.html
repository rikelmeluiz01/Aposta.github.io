<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cassino do Rikelme 🎰</title>
</head>
<body style="text-align:center; background:#111; color:white; font-family:Arial;">

<h1>🎰 Cassino do Rikelme 🎰</h1>

<input id="nome" placeholder="Digite seu nome">
<button onclick="entrar()">Entrar</button>

<h2 id="saldo"></h2>

<button onclick="girar()">Girar</button>

<h3 id="resultado"></h3>

<h2>🏆 Ranking Global</h2>
<ul id="ranking"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAeuP4v7OW59GGrCJ1CMoW2Ta7LchapbEI",
  authDomain: "cassino-rikelme.firebaseapp.com",
  projectId: "cassino-rikelme",
  storageBucket: "cassino-rikelme.firebasestorage.app",
  messagingSenderId: "191676209805",
  appId: "1:191676209805:web:475344a1a9bd447dc660c4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let saldo = 100;
let nome = "";

window.entrar = function() {
  nome = document.getElementById("nome").value;
  document.getElementById("saldo").innerText = "Saldo: R$" + saldo;
  atualizarRanking();
}

async function salvar() {
  await setDoc(doc(db, "ranking", nome), {
    nome: nome,
    saldo: saldo
  });
}

async function atualizarRanking() {
  const querySnapshot = await getDocs(collection(db, "ranking"));
  let lista = document.getElementById("ranking");
  lista.innerHTML = "";

  querySnapshot.forEach((doc) => {
    let li = document.createElement("li");
    li.textContent = doc.data().nome + " - R$" + doc.data().saldo;
    lista.appendChild(li);
  });
}

window.girar = function() {
  saldo += Math.floor(Math.random() * 50) - 20;
  document.getElementById("saldo").innerText = "Saldo: R$" + saldo;

  salvar();
  atualizarRanking();
}
</script>

</body>
</html>
