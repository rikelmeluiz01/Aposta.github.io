<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cassino do Rikelme 🎰</title>
</head>
<body>

<h1>🎰 Cassino do Rikelme 🎰</h1>

<input id="nome" placeholder="Seu nome">
<button onclick="entrar()">Entrar</button>

<h2 id="saldo"></h2>
<button onclick="girar()">Girar</button>

<h3 id="resultado"></h3>

<h2>🏆 Ranking Global</h2>
<ul id="ranking"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 COLOCA SEU firebaseConfig AQUI
const firebaseConfig = {
  apiKey: "COLOQUE_AQUI",
  authDomain: "COLOQUE_AQUI",
  projectId: "COLOQUE_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let saldo = 100;
let nome = "";

function entrar() {
  nome = document.getElementById("nome").value;
  document.getElementById("saldo").innerText = "Saldo: R$" + saldo;
  atualizarRanking();
}

async function salvar() {
  await setDoc(doc(db, "ranking", nome), {
    nome: nome,
    saldo: saldo
  });
}

async function atualizarRanking() {
  const querySnapshot = await getDocs(collection(db, "ranking"));
  let lista = document.getElementById("ranking");
  lista.innerHTML = "";

  querySnapshot.forEach((doc) => {
    let li = document.createElement("li");
    li.textContent = doc.data().nome + " - R$" + doc.data().saldo;
    lista.appendChild(li);
  });
}

function girar() {
  saldo += Math.floor(Math.random() * 50) - 20;
  document.getElementById("saldo").innerText = "Saldo: R$" + saldo;

  salvar();
  atualizarRanking();
}
</script>

</body>
</html>
